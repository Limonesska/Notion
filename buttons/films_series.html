      --my-color-accent:#2c3e50;
      --black: #3c3c3c;
      --black-accent: #2d2d2d;
      --blue: #aec6cf;
      --blue-accent: #7ea4b3;

      color: inherit;
      border: none;

    }

    }

      box-shadow: 0px 4px 0px var(--my-color-accent);
    }
